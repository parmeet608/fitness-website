<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Free Fitness Plan Generator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="container">
    <h1>Free Workout Plan Generator</h1>
    <p class="subtitle">Tell us your goal and experience level to get a practical, beginner-friendly plan.</p>

    <form id="plan-form" class="card">
      <label for="goal">What is your main fitness goal?</label>
      <select id="goal" required>
        <option value="">Select a goal</option>
        <option value="fat-loss">Fat loss</option>
        <option value="muscle-gain">Muscle gain</option>
        <option value="strength">Build strength</option>
        <option value="general-fitness">General fitness</option>
      </select>

      <fieldset>
        <legend>Where do you usually work out?</legend>
        <label><input type="radio" name="location" value="gym" required> Gym</label>
        <label><input type="radio" name="location" value="home" required> Home</label>
      </fieldset>

      <fieldset>
        <legend>How much experience do you have?</legend>
        <label><input type="radio" name="experience" value="beginner" required> Beginner / just starting</label>
        <label><input type="radio" name="experience" value="intermediate"> Intermediate</label>
        <label><input type="radio" name="experience" value="advanced"> Advanced</label>
      </fieldset>

      <label for="age">Age</label>
      <input id="age" type="number" min="13" max="85" required placeholder="e.g. 24">

      <label for="gender">Gender</label>
      <select id="gender" required>
        <option value="">Select gender</option>
        <option value="male">Male</option>
        <option value="female">Female</option>
        <option value="non-binary">Non-binary</option>
        <option value="prefer-not">Prefer not to say</option>
      </select>

      <label for="activity-level">Current activity level</label>
      <select id="activity-level" required>
        <option value="">Select activity level</option>
        <option value="sedentary">Sedentary (little movement)</option>
        <option value="light">Lightly active (1-2 active days/week)</option>
        <option value="moderate">Moderately active (3-4 active days/week)</option>
        <option value="high">Highly active (5+ active days/week)</option>
      </select>

      <label for="days">How many workout days per week can you commit?</label>
      <input id="days" type="number" min="2" max="7" required placeholder="e.g. 4">

      <label for="time">How much time per workout session? (minutes)</label>
      <input id="time" type="number" min="20" max="180" required placeholder="e.g. 60">

      <label for="program-style">Preferred program style</label>
      <select id="program-style" required>
        <option value="">Select program style</option>
        <option value="push-pull-legs">Push Pull Legs</option>
        <option value="upper-lower">Upper Lower Split</option>
        <option value="bro-split">Bro Split</option>
        <option value="full-body">Full Body</option>
        <option value="no-preference">No preference (AI choose best)</option>
      </select>

      <fieldset>
        <legend>Can you do cardio after weight training?</legend>
        <label><input type="radio" name="cardio" value="yes" required> Yes</label>
        <label><input type="radio" name="cardio" value="no" required> No</label>
        <label><input type="radio" name="cardio" value="sometimes" required> Sometimes</label>
      </fieldset>

      <label for="history">Injuries, pain points, medical limits, and workout history</label>
      <textarea id="history" rows="4" placeholder="Example: mild knee pain, no back injury, trained on/off for 1 year, can use dumbbells and machines."></textarea>

      <button type="submit">Generate My Free Plan</button>
    </form>

    <section id="result" class="card hidden" aria-live="polite">
      <h2>Your Personalized Plan</h2>
      <div id="plan-output"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
